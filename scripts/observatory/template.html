  html,body{margin:0;height:100%;background:#04050b;overflow:hidden;}
  *{box-sizing:border-box;}
  ::selection{background:rgba(138,180,255,0.3);}
  input:focus,textarea:focus{outline:none;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  @keyframes obsFadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes obsSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes obsRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes obsPop{from{opacity:0;transform:scale(.965) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .obs-root{position:fixed; inset:0; overflow:hidden; background:radial-gradient(130% 120% at 50% -12%, #10152e 0%, #080b18 46%, #04050b 100%); color:#e9ecf5; font-family:'Hanken Grotesk',system-ui,sans-serif; -webkit-font-smoothing:antialiased;}
  /* Real-data hardening: long company / title strings must never overflow a panel. */
  .obs-wrap-any{overflow-wrap:anywhere; word-break:break-word;}
  /* Narrow screens: shrink the header so it can't collide with the centered search. */
  @media (max-width:1120px){
    .obs-title{font-size:22px !important;}
    .obs-search{width:min(460px,50vw) !important;}
  }
  @media (max-width:900px){
    .obs-search{width:min(400px,46vw) !important;}
  }
</style>

<div class="obs-root">

  <canvas id="obs-canvas" style="position:absolute; inset:0; width:100%; height:100%; display:block; cursor:grab;"></canvas>
  <div style="position:absolute; top:0; left:0; right:0; height:220px; z-index:8; pointer-events:none; background:linear-gradient(to bottom, rgba(4,5,11,0.97) 0%, rgba(5,7,16,0.9) 38%, rgba(6,8,18,0.55) 72%, rgba(6,8,18,0) 100%);"></div>
  <div style="position:absolute; bottom:0; left:0; right:0; height:160px; z-index:8; pointer-events:none; background:linear-gradient(to top, rgba(4,5,11,0.94) 0%, rgba(5,7,16,0.62) 52%, rgba(6,8,18,0) 100%);"></div>

  <div id="obs-tip" style="position:absolute; left:0; top:0; transform:translate(-9999px,-9999px); pointer-events:none; z-index:40; background:rgba(9,12,22,0.94); border:1px solid rgba(255,255,255,0.14); border-radius:11px; padding:9px 12px; backdrop-filter:blur(10px); box-shadow:0 10px 34px rgba(0,0,0,0.55); white-space:nowrap;"></div>

  <!-- Header -->

    <div style="pointer-events:auto;">
      <div style="display:flex; align-items:center; gap:9px;">
        <div style="width:9px;height:9px;border-radius:50%;background:#f5c77e;box-shadow:0 0 13px 2px rgba(245,199,126,0.75);"></div>
        <div style="font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.24em; color:#aeb6d0;">OBSERVATORY</div>
      </div>
      <div class="obs-title" style="font-family:'Instrument Serif',serif; font-size:25px; line-height:1.0; margin-top:6px; color:#eef1f8; letter-spacing:0.01em;">Your network</div>
      <div style="font-family:'Instrument Serif',serif; font-style:italic; font-size:14px; line-height:1.1; margin-top:2px; color:#aeb6d0;">for the first time</div>
      <button data-act="openReading" style="margin-top:10px; display:inline-flex; align-items:center; gap:7px; background:rgba(245,199,126,0.1); border:1px solid rgba(245,199,126,0.32); color:#f2d29a; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; padding:6px 11px; border-radius:9px; cursor:pointer;">✦ READ MY NETWORK</button>
      <button id="obs-sync-btn" data-act="openSync" style="display:none; margin-top:10px; margin-left:8px; align-items:center; gap:7px; background:rgba(138,180,255,0.12); border:1px solid rgba(138,180,255,0.4); color:#cddaff; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.08em; padding:6px 11px; border-radius:9px; cursor:pointer;"></button>
    </div>

<script>

  PALETTE:['#f2c14e','#f4924f','#f26d6d','#e85f9c','#c168e0','#8f7bff','#5f8dff','#3fa7ff','#33c4cf','#3ad39c','#7fd257','#d4d24a'],

    var funcOrder=Object.keys(fcnt).sort(function(a,b){return fcnt[b]-fcnt[a];});

    var eqFn=function(k){return function(p){return p.func===k;};};

        {key:'exec',label:'C-level (CxO)',test:function(p){return p.rank===8&&!p.isFounder;}},
        {key:'vp',label:'VP',test:function(p){return p.rank===7;}},
        {key:'dir',label:'Director & above',test:function(p){return p.rank>=6;}},
        {key:'mgr',label:'Manager & above',test:function(p){return p.rank>=5;}},
        {key:'ic',label:'Individual contributors',test:function(p){return p.rank<=3&&!p.isFounder;}}
      ],
      era: [
        {key:'early',label:'The early days (’09–’16)',test:function(p){return p.eraIdx<=1;}},
        {key:'e3',label:'’17–’19',test:function(p){return p.era==='e3';}},
        {key:'e4',label:'’20–’22',test:function(p){return p.era==='e4';}},

      reconn:people.filter(function(p){return p.eraIdx<=1&&p.rank>=6;}).length,

    this._stats={ people:people.length, companies:Object.keys(cc).length, span:sp };

    if(notableCo && (cc[notableCo]||0)>0) this.CHIPS.push({id:'notable', label:'Who’s at '+notableCo+'?', facets:{company:notableCo}});

    if(people.filter(function(p){return /chief operating officer/i.test(p.title);}).length>0)

  },

  // deterministic PRNG so layout is stable across reloads

  rand:function(){ var a=this._seed|=0; a=this._seed=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; },

  sprite:function(hex){ if(!this._sp) this._sp={}; if(this._sp[hex]) return this._sp[hex]; var s=128; var cv=document.createElement('canvas'); cv.width=s; cv.height=s; var x=cv.getContext('2d'); var A=this.hx(hex); var g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2); g.addColorStop(0,'rgba('+A[0]+','+A[1]+','+A[2]+',1)'); g.addColorStop(0.14,'rgba('+A[0]+','+A[1]+','+A[2]+',0.62)'); g.addColorStop(0.42,'rgba('+A[0]+','+A[1]+','+A[2]+',0.14)'); g.addColorStop(1,'rgba('+A[0]+','+A[1]+','+A[2]+',0)'); x.fillStyle=g; x.fillRect(0,0,s,s); this._sp[hex]=cv; return cv; },

  // ---------------- categories ----------------

      var cnt2={}; P.forEach(function(p){cnt2[p.func]=(cnt2[p.func]||0)+1;}); var sorted2=Object.keys(cnt2).sort(function(a,b){return cnt2[b]-cnt2[a];});
      var cats2=sorted2.map(function(k,i){return {key:k,label:k,count:cnt2[k],color:self.PALETTE[i%self.PALETTE.length]};});
      var cm2={}; cats2.forEach(function(c){cm2[c.key]=c.color;});
      return {cats:cats2, keyOf:function(p){return p.func;}, colorOf:function(k){return cm2[k];}, ordinal:false};
    }
    if(dim==='seniority'){
      var labels={1:'Entry',2:'IC',3:'Senior',4:'Staff / Lead',5:'Manager',6:'Director',7:'VP',8:'Executive'};
      var cnt3={}; P.forEach(function(p){cnt3[p.rank]=(cnt3[p.rank]||0)+1;});
      var ranks=[1,2,3,4,5,6,7,8].filter(function(r){return cnt3[r];});

      var cm3={}; cats3.forEach(function(c){cm3[c.key]=c.color;});
      return {cats:cats3, keyOf:function(p){return String(p.rank);}, colorOf:function(k){return cm3[k];}, ordinal:true};
    }

    var cm4={}; cats4.forEach(function(c){cm4[c.key]=c.color;});

  },
  buildLegend:function(dim,cats){ var self=this; return cats.map(function(c){return {label:c.label + (c.cos?(' (+'+c.cos+' cos)'):''), count:self.fmt(c.count), color:c.color, glow:self.hexA(c.color,0.6)};}); },

  // ---------------- layout ----------------
  computeTargets:function(){

  layoutField:function(cats){

    var dustR=690;
    this.people.forEach(function(p){ if(p.isOther){ var rr=dustR*Math.sqrt(p.r1); var a=p.r2*6.28318; p.tx=Math.cos(a)*rr; p.ty=Math.sin(a)*rr; return; } var c=centers[p.key]||{x:0,y:0,r:60,n:1,i:0}; var idx=c.i++; var rr2=c.r*Math.sqrt((idx+0.5)/Math.max(1,c.n)); var a2=idx*golden; p.tx=c.x+Math.cos(a2)*rr2; p.ty=c.y+Math.sin(a2)*rr2; });

  },
  layoutOrbit:function(dim,cats,ordinal){
    var self=this; var inner=95, outer=492, range=outer-inner;
    var named=cats.filter(function(c){return c.key!=='__other';});
    var nc=named.length; var ci={}; named.forEach(function(c,i){ci[c.key]=i;});
    var catCounts={}; this.people.forEach(function(p){ if(!p.isOther) catCounts[p.key]=(catCounts[p.key]||0)+1; });
    var cIdx={}; var gi=0; var total=this.people.length;

      var ang;

      else if(ordinal){ ang=(gi/total)*6.28318 + (p.r2-0.5)*0.06; gi++; }
      else { var sw=6.28318/nc; var idx=(cIdx[p.key]=(cIdx[p.key]||0)+1)-1; var n=catCounts[p.key]||1; ang=ci[p.key]*sw + ((idx+0.5)/n)*sw; }

    if(!ordinal){ var sw2=6.28318/nc; named.forEach(function(c,i){ var ang=i*sw2+sw2*0.5, rr=outer+32; var cx=Math.cos(ang); self.labels.push({x:cx*rr, y:Math.sin(ang)*rr, text:self.clip(c.label,20).toUpperCase(), count:c.count, align:(cx<-0.3?'right':(cx>0.3?'left':'center'))}); }); }

  },
  layoutStrata:function(cats){
    var self=this; var per=6, cellX=13, cellY=13, colW=per*cellX, gap=34;
    var cols=cats.filter(function(c){return c.key!=='__other';}); var n=cols.length; var totalW=n*(colW+gap)-gap; var x0=-totalW/2;

  },
  buildEdges:function(layout,dim){

    this.edgesOn = layout!=='strata' && !(layout==='orbit' && (dim==='seniority'||dim==='era'));
    if(!this.edgesOn) return;
    var groups={};
    this.people.forEach(function(p){ if(p.isOther) return; (groups[p.key]=groups[p.key]||[]).push(p); });

// ---- small helpers ----
function esc(s){ return (''+ (s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setText(id,t){ var e=document.getElementById(id); if(e) e.textContent=t; }

// ---- event delegation ----
function wire(app){
  document.addEventListener('click', function(e){
    var t=e.target.closest('[data-act]'); if(!t) return;
    var act=t.getAttribute('data-act'); var arg=t.getAttribute('data-arg'); var arg2=t.getAttribute('data-arg2');
    switch(act){
      case 'openReading': app.openReading(); break;
      case 'closeReading': app.closeReading(); break;
      case 'openSync': app.openSync(); break;
      case 'closeSync': app.closeSync(); break;
      case 'copySync': app.copySync(); break;
      case 'clearFilter': app.clearFilter(); break;
      case 'setLayout': app.setLayout(arg); break;
      case 'setDim': app.setDim(arg); break;
      case 'toggleFacetMenu': app.toggleFacetMenu(arg); break;
      case 'setFacet': app.setFacet(arg,arg2); break;
      case 'clearFacetDim': app.clearFacetDim(arg); break;
      case 'chip': { var c=app.CHIPS.find(function(x){return x.id===arg;}); if(c) app.applyChip(c); break; }
      case 'focus': app.focusPerson(parseInt(arg,10)); break;
      case 'closePanel': app.closePanel(); break;
      case 'reconnect': app.toggleReconnect(); break;
      case 'read-company': app.applyReading({company:arg}); break;
      case 'read-reconn': app.applyReading({era:'early',sen:'dir'}); break;
      case 'read-solo': app.applyReadingSpecial('solo'); break;
      case 'read-dir': app.applyReading({sen:'dir'}); break;
      case 'read-recent': app.applyReading({era:'e5'}); break;
    }
  });
  // modal backdrop click closes; inner click doesn't
  document.getElementById('r-reading').addEventListener('click', function(e){
    if(e.target.closest('[data-stop]') && !e.target.closest('[data-act]')) e.stopPropagation();
  }, true);
  document.getElementById('r-sync').addEventListener('click', function(e){
    if(e.target.closest('[data-stop]') && !e.target.closest('[data-act]')) e.stopPropagation();
  }, true);
  document.addEventListener('input', function(e){
    var t=e.target; if(!t.getAttribute) return; var act=t.getAttribute('data-act');
    if(act==='search') app.onSearch(t.value);
    else if(act==='note') app.onNote(t.value);
  });
}

// ---- boot ----
function boot(){
  var app=new App();
  try{ app.notes=JSON.parse(localStorage.getItem('obs_notes')||'{}'); }catch(e){ app.notes={}; }
  try{ app.recon=JSON.parse(localStorage.getItem('obs_recon')||'{}'); }catch(e){ app.recon={}; }
  app.build();
  app.computeTargets();
  app.computeMatch();
  wire(app);
  app.render();
  app.renderReading();
  app.refreshSyncBtn();
  app.initCanvas();
  window.__obs=app;
}
